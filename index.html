<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Relational N-Back — Logic‑Only N‑Match (Voice + Visual)</title>
<style>
:root { --bg:#0b0d10; --fg:#e6fbff; --a:#00ccff; --mut:#8fe7ff }
*{ box-sizing:border-box }
body{ font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); margin:0; padding:16px }
.wrap{ max-width:1060px; margin:0 auto }
.row{ display:flex; gap:12px; flex-wrap:wrap }
.col{ flex:1 1 320px }
.box{ background:#101418; border:1px solid rgba(0,200,255,.25); border-radius:14px; padding:12px }
.title{ font-weight:800; margin-bottom:6px; letter-spacing:.3px }
.btn{ background:#0b0d10; color:var(--a); border:1px solid var(--a); border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer }
.btn:disabled{ opacity:.5; cursor:not-allowed }
label{ font-size:12px; color:var(--mut); display:block; margin:6px 0 }
input[type=range],select{ width:100% }
.kbd{ border:1px solid rgba(255,255,255,.25); padding:2px 6px; border-radius:6px; background:#0b0d10 }
.mut{ color:var(--mut); font-size:12px }
#premiseText{ margin-top:12px; min-height:76px; background:#0e1113; border:1px solid rgba(0,200,255,.25); border-radius:12px; padding:10px; font-size:18px; line-height:1.6 }
#premiseText .rel{ padding:0 4px; border-radius:6px }
#premiseText .rel.active{ background:rgba(0,200,255,.20); outline:1px solid rgba(0,200,255,.45) }
#premiseText .sep{ opacity:.65 }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="col">
      <div class="box">
        <div class="title">Timing</div>
        <label>N‑back level: <span id="nVal">1</span></label>
        <input id="n" type="range" min="1" max="10" value="1">
        <label>Trials per block: <span id="tVal">40</span></label>
        <input id="trials" type="range" min="10" max="200" step="5" value="40">
        <label>Trial duration (ms): <span id="dVal">5000</span></label>
        <input id="dur" type="range" min="1500" max="15000" step="250" value="5000">
        <label>Pause between relations in the same premise (ms): <span id="pVal">1000</span></label>
        <input id="pauseTime" type="range" min="0" max="6000" step="50" value="1000">
        <label>Target match rate: <span id="rVal">25%</span></label>
        <input id="rate" type="range" min="5" max="60" step="5" value="25">
        <div class="mut">N‑matches are computed <b>only</b> from relational logic (structure + vectors). Labels/text never affect matching.</div>
      </div>
    </div>
    <div class="col">
      <div class="box">
        <div class="title">Voice</div>
        <label>Country / Region</label>
        <select id="regionSelect"></select>
        <label>Voice</label>
        <select id="voice"></select>
        <label>Rate: <span id="rateVal">0.92</span></label>
        <input id="vRate" type="range" min="0.7" max="1.6" step="0.01" value="0.92">
        <label>Pitch: <span id="pitchVal">1.22</span></label>
        <input id="vPitch" type="range" min="0.7" max="2" step="0.01" value="1.22">
        <label>Volume: <span id="vVolVal">1.00</span></label>
        <input id="vVol" type="range" min="0" max="1" step="0.05" value="1.00">
        <div style="display:flex;gap:8px;margin-top:8px">
          <button id="testVoice" class="btn" type="button">Test voice</button>
          <button id="preloadVoices" class="btn" type="button">Preload voices</button>
        </div>
        <div class="mut" id="voiceHint">Tip: pick a local region (e.g., Australia) for clear pronunciation.</div>
      </div>
    </div>
    <div class="col">
      <div class="box">
        <div class="title">Controls / Status</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
          <button id="start" class="btn">▶ Start</button>
          <button id="pause" class="btn" disabled>⏸ Pause</button>
          <button id="reset" class="btn" disabled>🔄 Reset</button>
          <button id="hit" class="btn" disabled>✓ Match (<span class="kbd">M</span>)</button>
          <button id="skip" class="btn" disabled>⏭ Skip</button>
        </div>
        <div class="mut" style="margin-top:8px">
          Trial <span id="idx">0</span>/<span id="max">40</span> • Planned: <span id="ptype">—</span> • Actual: <span id="isMatch">—</span>
        </div>
        <div class="mut">Correct: <span id="corr">0</span> • Errors: <span id="err">0</span></div>
      </div>
    </div>
  </div>
  <div class="box" style="margin-top:12px">
    <div class="title">Premise (spoken + visual)</div>
    <div id="premiseText" aria-live="polite">—</div>
  </div>
</div>
<script>
// Shortcuts
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

// Voice config and helpers
let VOICE = null;
let voicesReady = false;
let userRateChanged = false;
let userPitchChanged = false;

const REGION_NAMES = {
  AU:'Australia', GB:'United Kingdom', UK:'United Kingdom', US:'United States',
  CA:'Canada', NZ:'New Zealand', IE:'Ireland', IN:'India', ZA:'South Africa',
  PH:'Philippines', SG:'Singapore', HK:'Hong Kong', NG:'Nigeria'
};
const regionCode = lang => (String(lang).match(/^[a-z]{2,3}[-_]?([A-Z]{2})/)||[])[1] || '';
const regionName = lang => REGION_NAMES[regionCode(lang)] || (/^en\b/i.test(lang) ? 'Global English' : 'Other Region');

const POS = /\b(female|zira|aria|ava|jenny|jessa|samantha|kendra|joanna|olivia|zoe|ella|mia|isla|karen|tessa|moira|hazel|serena|victoria|natasha|catherine|susan|allison|amy|emma|maya|sophia|isabella)\b/i;
const NEG = /\b(male|daniel|george|michael|mark|tom|fred|brian|kevin|liam|adam|andy|ben|bruce|charles|david|chris|eric|frank|jack|john|luke|matt|mike|nathan|paul|peter|ryan|steve|tim)\b/i;
const vKey = v => v.voiceURI || (v.name + '|' + v.lang);

function feminineScore(v) {
  const s = (v.name + ' ' + v.voiceURI).toLowerCase();
  let score = 0;
  if (POS.test(s)) score += 4;
  if (/female/.test(s)) score += 5;
  if (NEG.test(s)) score -= 7;
  return score;
}

// Friendly names per region for UI (internally uses these names only)
const FRIENDLY_POOL = {
  'Australia':['Zoe','Isla','Mia','Sophie','Olivia','Ava','Ella','Grace','Ruby','Lily'],
  'United Kingdom':['Sophie','Amelia','Olivia','Grace','Ava','Emily','Isla','Lucy','Chloe','Mia'],
  'United States':['Amy','Emma','Ava','Mia','Sophia','Isabella','Olivia','Ella','Zoe','Grace'],
  'Canada':['Sophie','Chloe','Amelia','Maya','Ella','Zoe','Olivia','Emma','Ava','Mia'],
  'Ireland':['Aoife','Saoirse','Niamh','Aisling','Ciara','Orla','Molly','Katie','Ella','Chloe'],
  'New Zealand':['Aria','Isla','Olivia','Ava','Emily','Sophie','Mia','Zoe','Ella','Grace'],
  'South Africa':['Tessa','Leah','Olivia','Mia','Ava','Ella','Zoe','Grace','Ruby','Chloe'],
  'India':['Aisha','Anaya','Diya','Ira','Kavya','Kiara','Maya','Riya','Sara','Ishita'],
  'Philippines':['Althea','Ariana','Bianca','Clara','Elena','Hannah','Isabella','Julia','Mika','Sofia'],
  'Singapore':['Alyssa','Cheryl','Clara','Elise','Hazel','Jade','Mei','Nicole','Sabrina','Tara'],
  'Hong Kong':['Anna','Cathy','Iris','Joyce','Lily','Mandy','Nina','Queenie','Vicky','Yuki'],
  'Nigeria':['Ada','Amara','Chioma','Ifunanya','Ijeoma','Kachi','Nkem','Nkechi','Ola','Zainab'],
  'Global English':['Amy','Ella','Zoe','Mia','Ava','Sophie','Lily','Ruby','Grace','Chloe'],
  'Other Region':['Amy','Ella','Zoe','Mia','Ava','Sophie','Lily','Ruby','Grace','Chloe']
};
const friendlyNames = new Map();

// Load voices robustly (wake engine, wait for event, poll if needed)
async function loadVoices(maxWait=6000) {
  if (!('speechSynthesis' in window)) return [];
  try {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0; u.rate = 10;
    speechSynthesis.speak(u);
  } catch (_) {}
  const start = performance.now();
  return new Promise(resolve => {
    const poll = setInterval(() => {
      const vs = speechSynthesis.getVoices();
      if (vs.length) {
        clearInterval(poll);
        resolve(vs);
      } else if (performance.now() - start > maxWait) {
        clearInterval(poll);
        resolve(vs);
      }
    }, 100);
    speechSynthesis.onvoiceschanged = () => {
      clearInterval(poll);
      resolve(speechSynthesis.getVoices());
    };
  });
}

async function initVoices() {
  if (voicesReady) return;
  const vs = await loadVoices();
  if (!vs.length) {
    $('voiceHint').textContent = 'No voices detected. Use Preload voices or try another browser.';
    return;
  }
  // Build region options
  const regions = [...new Set(vs.map(v => regionName(v.lang)))].sort();
  $('regionSelect').innerHTML = '';
  regions.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    $('regionSelect').appendChild(opt);
  });
  // Default region preference
  $('regionSelect').value = ['Australia','United Kingdom','United States'].find(p => regions.includes(p)) || regions[0];
  // Populate voices for selected region
  populateVoices(vs, $('regionSelect').value);
  $('regionSelect').onchange = () => populateVoices(vs, $('regionSelect').value);
  voicesReady = true;
}

function populateVoices(vs, region) {
  const list = vs.filter(v => regionName(v.lang) === region);
  const ranked = list.map(v => ({v, score: feminineScore(v)})).sort((a,b) => b.score - a.score);
  const fem = ranked.filter(x => x.score > 0).map(x => x.v);
  const final = fem.length ? fem : list;
  const pool = FRIENDLY_POOL[region] || FRIENDLY_POOL['Other Region'];
  let i = 0;
  final.forEach(v => {
    const key = vKey(v);
    if (!friendlyNames.has(key)) {
      const base = pool[i % pool.length];
      const cyc = Math.floor(i / pool.length);
      friendlyNames.set(key, cyc ? `${base} ${cyc+1}` : base);
      i++;
    }
  });
  $('voice').innerHTML = '';
  final.forEach(v => {
    const opt = document.createElement('option');
    opt.value = vKey(v);
    opt.textContent = friendlyNames.get(vKey(v)) || 'Voice';
    opt.title = `${v.name} — ${region}`;
    $('voice').appendChild(opt);
  });
  const best = fem[0] || final[0] || null;
  if (best) {
    $('voice').value = vKey(best);
    VOICE = best;
    applyDefaults();
  }
}

function applyDefaults() {
  if (!userRateChanged) {
    $('vRate').value = 0.92;
    $('rateVal').textContent = '0.92';
  }
  if (!userPitchChanged) {
    $('vPitch').value = 1.22;
    $('pitchVal').textContent = '1.22';
  }
}

// Binding slider update to mark user changes
$('vRate').oninput = e => { userRateChanged = true; $('rateVal').textContent = (+e.target.value).toFixed(2); };
$('vPitch').oninput = e => { userPitchChanged = true; $('pitchVal').textContent = (+e.target.value).toFixed(2); };
$('vVol').oninput   = e => { $('vVolVal').textContent = (+e.target.value).toFixed(2); };

// Preload voices on demand
$('preloadVoices').onclick = initVoices;

// Test voice
$('testVoice').onclick = async () => {
  if (!voicesReady) await initVoices();
  await speak('Testing voice. Example: G six is one level below V four. I nine is two levels above V four.');
};

// Speech function
function speak(text) {
  return new Promise(resolve => {
    if (!VOICE || !('speechSynthesis' in window)) {
      resolve(); return;
    }
    const u = new SpeechSynthesisUtterance(text);
    u.voice = VOICE;
    u.lang = VOICE.lang;
    u.rate = +$('vRate').value;
    u.pitch = +$('vPitch').value;
    u.volume = +$('vVol').value;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}
function cancelSpeech() { try { speechSynthesis.cancel(); } catch (_) {} }

// Game state
const historyArr = [];
const planArr = [];
let NLevel = 1;
let MaxTrials = 40;
let trialDuration = 5000;
let relationPause = 1000;
let targetRate = 25;
let currentIndex = 0;
let running = false;
let paused = false;
let waitHandle = null;
let remainderHandle = null;
let correctCount = 0;
let errorCount = 0;
let spokenClauses = null;
let clauseIndex = 0;
let trialStartTime = 0;

// Plan block
function planBlock() {
  planArr.length = 0;
  for (let i = 0; i < MaxTrials; i++) {
    planArr.push(i >= NLevel && Math.random()*100 < targetRate);
  }
}

// Determine if actual match
function isActualMatch(i) {
  return i >= NLevel && sentencesCompatible(historyArr[i - NLevel], historyArr[i]);
}

// Generate random premise (two or three clauses)
function generateRandomPremise() {
  const [A,B,C,D] = uniqueTokens(4);
  const pickRel = () => {
    if (Math.random() < 0.6) {
      const d = HORIZ[Math.floor(Math.random()*HORIZ.length)];
      return { k: 'h', d };
    } else {
      const n = LEVELS[Math.floor(Math.random()*LEVELS.length)];
      const up = Math.random() < 0.5;
      return { k: 'v', n, up };
    }
  };
  const clause = (X, rel, Y) => {
    if (rel.k === 'h') {
      return `${X} is ${rel.d} of ${Y}`;
    } else {
      return `${X} is ${rel.n} ${rel.n===1?'level':'levels'} ${rel.up?'above':'below'} ${Y}`;
    }
  };
  const r1 = pickRel();
  const r2 = pickRel();
  const r3 = pickRel();
  switch (Math.floor(Math.random()*4)) {
    case 0: return `${clause(A,r1,B)} and ${clause(B,r2,C)}`;
    case 1: return `${clause(A,r1,B)} and ${clause(C,r2,A)}`;
    case 2: return `${clause(A,r1,B)} and ${clause(C,r2,B)} and ${clause(A,r3,C)}`;
    default: return `${clause(A,r1,B)} and ${clause(C,r2,A)} and ${clause(B,r3,C)}`;
  }
}

// Speak clauses sequentially with pauses
async function speakClauses() {
  if (!spokenClauses) return;
  if (!trialStartTime) trialStartTime = performance.now();
  while (running && !paused && clauseIndex < spokenClauses.length) {
    setActivePart(clauseIndex);
    await speak(spokenClauses[clauseIndex] + '.');
    if (!running || paused) return;
    if (clauseIndex < spokenClauses.length - 1) {
      await new Promise(res => {
        waitHandle = setTimeout(() => { waitHandle = null; res(); }, relationPause);
      });
      if (!running || paused) return;
    }
    clauseIndex++;
  }
  setActivePart(-1);
  const elapsed = performance.now() - trialStartTime;
  const rem = Math.max(0, trialDuration - elapsed);
  await new Promise(res => {
    remainderHandle = setTimeout(() => { remainderHandle = null; res(); }, rem);
  });
}

// Determine next sentence (match vs non-match)
function nextSentence() {
  const wantMatch = planArr[currentIndex] && currentIndex >= NLevel;
  if (wantMatch) {
    return buildCompatible(historyArr[currentIndex - NLevel]);
  }
  let s; let tries = 0;
  do {
    s = generateRandomPremise();
    tries++;
  } while (currentIndex >= NLevel && sentencesCompatible(historyArr[currentIndex - NLevel], s) && tries < 200);
  if (currentIndex >= NLevel && sentencesCompatible(historyArr[currentIndex - NLevel], s)) {
    const rels = extractPremiseRelations(s);
    if (rels.length) {
      const r0 = rels[0];
      if (r0.rel.z !== 0) {
        r0.rel.z *= -1;
      } else {
        r0.rel.x *= -1; r0.rel.y *= -1;
      }
      s = rels.map(r => clauseString(r.from, r.rel, r.to)).join(' and ');
    }
  }
  return s;
}

// Run a single trial and schedule the next
async function runTrial() {
  if (!running || paused) return;
  if (currentIndex >= MaxTrials) { stopGame(); return; }
  const s = nextSentence();
  historyArr[currentIndex] = s;
  buildPremiseVisual(s);
  spokenClauses = verbalizeSentence(s);
  clauseIndex = 0;
  trialStartTime = performance.now();
  await speakClauses();
  if (!running || paused) return;
  currentIndex++;
  updateUI();
  runTrial();
}

// Start the game
function startGame() {
  if (running) return;
  running = true;
  paused = false;
  cancelSpeech();
  planBlock();
  currentIndex = 0;
  correctCount = 0;
  errorCount = 0;
  updateUI();
  $('pause').disabled = false;
  $('reset').disabled = false;
  $('hit').disabled = false;
  $('skip').disabled = false;
  $('regionSelect').disabled = true;
  $('voice').disabled = true;
  runTrial();
}

// Stop the game
function stopGame() {
  running = false;
  paused = false;
  clearTimeout(waitHandle);
  clearTimeout(remainderHandle);
  waitHandle = null;
  remainderHandle = null;
  trialStartTime = 0;
  spokenClauses = null;
  clauseIndex = 0;
  cancelSpeech();
  $('pause').disabled = true;
  $('skip').disabled = true;
  $('regionSelect').disabled = false;
  $('voice').disabled = false;
}

// Pause/resume toggle
function pauseGame() {
  if (!running && !paused) return;
  if (!paused) {
    paused = true;
    clearTimeout(waitHandle);
    clearTimeout(remainderHandle);
    waitHandle = null;
    remainderHandle = null;
    cancelSpeech();
    $('pause').textContent = '▶ Resume';
  } else {
    paused = false;
    $('pause').textContent = '⏸ Pause';
    if (spokenClauses && clauseIndex < spokenClauses.length) {
      speakClauses().then(() => {
        if (running && !paused) {
          currentIndex++;
          updateUI();
          runTrial();
        }
      });
    } else {
      const elapsed = performance.now() - trialStartTime;
      const rem = Math.max(0, trialDuration - elapsed);
      remainderHandle = setTimeout(() => {
        if (running && !paused) {
          currentIndex++;
          updateUI();
          runTrial();
        }
      }, rem);
    }
  }
}

// Reset game to initial state
function resetGame() {
  stopGame();
  $('start').disabled = false;
  $('pause').textContent = '⏸ Pause';
  currentIndex = 0;
  correctCount = 0;
  errorCount = 0;
  $('premiseText').textContent = '—';
  updateUI();
}

// Register a match attempt (M key or Match button)
function markMatch() {
  if (!running) return;
  const truth = isActualMatch(currentIndex);
  if (truth) correctCount++; else errorCount++;
  updateUI();
}

// Skip current trial
function skipCurrent() {
  if (!running) return;
  clearTimeout(waitHandle);
  clearTimeout(remainderHandle);
  cancelSpeech();
  currentIndex++;
  updateUI();
  runTrial();
}

// Update UI elements
function updateUI() {
  $('idx').textContent = currentIndex;
  $('max').textContent = MaxTrials;
  $('ptype').textContent = planArr[currentIndex] && currentIndex >= NLevel ? 'planned MATCH' : 'planned NON-match';
  $('isMatch').textContent = currentIndex >= NLevel ? String(isActualMatch(currentIndex)).toUpperCase() : '—';
  $('corr').textContent = correctCount;
  $('err').textContent = errorCount;
  $('nVal').textContent = NLevel;
  $('tVal').textContent = MaxTrials;
  $('dVal').textContent = trialDuration;
  $('pVal').textContent = relationPause;
  $('rVal').textContent = targetRate + '%';
}

// Voice test uses a simple example, but we pre-load voices asynchronously.
function applySexyDefaultsIfUntouched() {
  if (!userRateChanged) { $('vRate').value = 0.92; $('rateVal').textContent = '0.92'; }
  if (!userPitchChanged) { $('vPitch').value = 1.22; $('pitchVal').textContent = '1.22'; }
}

// Bind UI controls
$('start').onclick = async () => {
  await initVoices();
  if (!VOICE && speechSynthesis.getVoices().length) {
    const region = $('regionSelect').value;
    const all = speechSynthesis.getVoices().filter(v => regionName(v.lang) === region);
    VOICE = all.map(v => ({v, score:feminineScore(v)})).sort((a,b) => b.score - a.score)[0]?.v || all[0];
    applyDefaults();
  }
  startGame();
};
$('pause').onclick = pauseGame;
$('reset').onclick = resetGame;
$('hit').onclick = markMatch;
$('skip').onclick = skipCurrent;
window.addEventListener('keydown', e => { if (e.key.toLowerCase() === 'm') markMatch(); });

$('n').oninput = e => { NLevel = +e.target.value; $('nVal').textContent = NLevel; };
$('trials').oninput = e => { MaxTrials = +e.target.value; $('tVal').textContent = MaxTrials; $('max').textContent = MaxTrials; };
$('dur').oninput = e => { trialDuration = +e.target.value; $('dVal').textContent = trialDuration; };
$('pauseTime').oninput = e => { relationPause = +e.target.value; $('pVal').textContent = relationPause; };
$('rate').oninput = e => { targetRate = +e.target.value; $('rVal').textContent = targetRate + '%'; };

// Initialize voices on page load
document.addEventListener('DOMContentLoaded', initVoices);
</script>
</body>
</html>
