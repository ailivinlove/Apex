<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Relational N‑Back — Logic‑Only (8‑Direction + Vertical) — Voice + Visual Mode</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0b0d10; color: #e6fbff; margin: 0; padding: 16px; }
  .btn { background: #0b0d10; color: #00ccff; border: 1px solid #00ccff; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; margin-right:4px; }
  #premiseDisplay { margin-top: 16px; font-size: 1.2em; line-height: 1.4; min-height: 60px; }
  .relationPart { padding: 2px 4px; border-radius: 4px; }
  .relationPart.active { background: rgba(0,200,255,0.2); border: 1px solid rgba(0,200,255,0.5); }
</style>
</head>
<body>
<div>
  <button id="start" class="btn">▶ Start</button>
  <button id="pause" class="btn" disabled>⏸ Pause</button>
  <button id="reset" class="btn" disabled>🔄 Reset</button>
  <button id="hit" class="btn" disabled>✓ Match (M)</button>
  <label for="nLevel" style="margin-left:8px">N‑back level:</label>
  <input id="nLevel" type="number" value="1" min="1" style="width:50px">
  <label for="trialsPerBlock" style="margin-left:8px">Trials per block:</label>
  <input id="trialsPerBlock" type="number" value="40" min="1" style="width:60px">
  <label for="trialMs" style="margin-left:8px">Trial duration (ms):</label>
  <input id="trialMs" type="number" value="5000" min="1000" step="250" style="width:80px">
  <label for="pauseMs" style="margin-left:8px">Pause between relations (ms):</label>
  <input id="pauseMs" type="number" value="1000" min="0" step="100" style="width:80px">
  <label for="targetRate" style="margin-left:8px">Target match rate (%):</label>
  <input id="targetRate" type="number" value="25" min="0" max="100" style="width:60px">
  <label for="voiceSelect" style="margin-left:8px">Voice:</label>
  <select id="voiceSelect"></select>
  <label for="rateControl">Rate:</label>
  <input id="rateControl" type="number" value="1.00" min="0.5" max="2" step="0.05" style="width:60px">
  <label for="pitchControl">Pitch:</label>
  <input id="pitchControl" type="number" value="1.00" min="0" max="2" step="0.05" style="width:60px">
  <label for="volumeControl">Volume:</label>
  <input id="volumeControl" type="number" value="1.00" min="0" max="1" step="0.05" style="width:60px">
</div>
<div id="premiseDisplay"></div>
<script>
const $ = id => document.getElementById(id);
let selectedVoice = null;
const FRIENDLY_POOL = ['Amy','Chloe','Ella','Grace','Isla','Kara','Maya','Olive','Piper','Ruby','Tess','Uma','Zoe'];
const voiceKey = v => v.voiceURI || (v.name + '|' + v.lang);
let friendlyByKey = new Map();

// ===== Runtime state for pause/resume =====
let isRunning = false;
let isPaused = false;
let trialIndex = 0;
let currentParts = null;
let nextClauseIdx = 0;
let trialStartTs = 0;
let relationWaitTimeoutId = null;
let trialTimeoutId = null;

function assignFriendlyNames(voices){
  const females = voices.filter(v => v.name.toLowerCase().includes('female') || /fem/i.test(v.name) || /woman|girl/i.test(v.name) || true);
  const sorted = [...females].sort((a,b)=> (a.lang||'').localeCompare(b.lang||'') || (a.name||'').localeCompare(b.name||''));
  let idx = 0;
  sorted.forEach(v => {
    const key = voiceKey(v);
    if (!friendlyByKey.has(key)){
      const base = FRIENDLY_POOL[idx % FRIENDLY_POOL.length];
      const cycles = Math.floor(idx / FRIENDLY_POOL.length);
      friendlyByKey.set(key, cycles ? base + ' ' + (cycles+1) : base);
      idx++;
    }
  });
}

function populateVoices(){
  const select = $('voiceSelect');
  const voices = speechSynthesis.getVoices();
  assignFriendlyNames(voices);
  select.innerHTML = '';
  voices.forEach(v => {
    const key = voiceKey(v);
    if (!friendlyByKey.has(key)) return;
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = friendlyByKey.get(key);
    opt.dataset.lang = v.lang;
    select.appendChild(opt);
  });
  selectedVoice = voices.find(v=>v.lang.startsWith('en-AU') && friendlyByKey.has(voiceKey(v))) || voices.find(v=>friendlyByKey.has(voiceKey(v)));
  if (selectedVoice) select.value = voiceKey(selectedVoice);
}

if ('speechSynthesis' in window){
  if (speechSynthesis.getVoices().length) populateVoices();
  speechSynthesis.onvoiceschanged = () => { populateVoices(); $('voiceSelect').disabled = isRunning; };
}

$('voiceSelect').addEventListener('change', () => {
  const key = $('voiceSelect').value;
  const v = speechSynthesis.getVoices().find(v => voiceKey(v) === key);
  if (v) selectedVoice = v;
});

function speak(text, voiceSnap){
  return new Promise(resolve => {
    if (!window.speechSynthesis) { resolve(); return; }
    const utter = new SpeechSynthesisUtterance(text);
    if (voiceSnap) utter.voice = voiceSnap;
    utter.rate = parseFloat($('rateControl').value);
    utter.pitch = parseFloat($('pitchControl').value);
    utter.volume = parseFloat($('volumeControl').value);
    utter.lang = voiceSnap?.lang || 'en-AU';
    utter.onend = () => resolve();
    utter.onerror = () => resolve();
    speechSynthesis.speak(utter);
  });
}
function cancelSpeech(){ try{ speechSynthesis.cancel(); }catch(_){} }

function updatePremiseDisplay(parts) {
  const container = $('premiseDisplay');
  container.innerHTML = '';
  parts.forEach((part, idx) => {
    const span = document.createElement('span');
    span.className = 'relationPart';
    span.textContent = part;
    container.appendChild(span);
    if (idx < parts.length - 1) container.appendChild(document.createTextNode(' and '));
  });
}
function setActiveClause(i){
  document.querySelectorAll('.relationPart').forEach((s, idx)=>s.classList.toggle('active', idx===i));
}
function waitMs(ms){
  return new Promise(res=>{ relationWaitTimeoutId = setTimeout(()=>{ relationWaitTimeoutId=null; res(); }, ms); });
}
async function speakRemainingClauses(perRelationDelayMs, voiceSnap){
  while (currentParts && nextClauseIdx < currentParts.length){
    if (!isRunning || isPaused) return;
    setActiveClause(nextClauseIdx);
    await speak(currentParts[nextClauseIdx], voiceSnap);
    if (!isRunning || isPaused) return;
    if (nextClauseIdx < currentParts.length - 1){
      await waitMs(perRelationDelayMs);
      if (!isRunning || isPaused) return;
    }
    nextClauseIdx++;
  }
  setActiveClause(-1);
}

const DIRS = ['north','south','east','west','northeast','northwest','southeast','southwest'];
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
function token(){ return LETTERS[Math.floor(Math.random()*26)] + (1+Math.floor(Math.random()*9)); }
function generatePremiseParts(){
  const A = token(), B = token(), C = token();
  const d1 = DIRS[Math.floor(Math.random()*DIRS.length)];
  const d2 = DIRS[Math.floor(Math.random()*DIRS.length)];
  return [`${A} is 1 ${d1} of ${B}`, `${B} is 1 ${d2} of ${C}`];
}

let isRunning = false, trialIndex = 0, paused = false;
async function runNextTrial(){
  if (!isRunning || isPaused) return;
  const pauseMs = parseInt($('pauseMs').value, 10) || 0;
  const trialMs = parseInt($('trialMs').value, 10) || 3000;
  const voiceSnap = selectedVoice;

  currentParts = generatePremiseParts();
  nextClauseIdx = 0;
  trialStartTs = performance.now();

  await speakRemainingClauses(pauseMs, voiceSnap);
  if (!isRunning || isPaused) return;
  const elapsed = performance.now() - trialStartTs;
  const remain = Math.max(0, trialMs - elapsed);
  trialTimeoutId = setTimeout(()=>{ if (isRunning && !isPaused){ trialIndex++; runNextTrial(); } }, remain);
}

$('start').onclick = () => {
  $('hit').disabled = false; $('pause').disabled = false; $('reset').disabled = false;
  if (!selectedVoice && speechSynthesis.getVoices().length){ selectedVoice = speechSynthesis.getVoices()[0]; }
  isPaused = false; isRunning = true; trialIndex = 0; runNextTrial();
};

$('pause').onclick = () => { paused = !paused; if (!paused) runNextTrial(); };
$('reset').onclick = () => { isRunning = false; paused = false; trialIndex = 0; $('hit').disabled = true; $('pause').disabled = true; $('reset').disabled = true; $('premiseDisplay').innerHTML=''; };

$('hit').onclick = () => { console.log('Match pressed'); };
$('pause').onclick = () => {
  if (!isRunning && !isPaused) return;
  if (!isPaused){
    // Enter paused state
    isPaused = true; isRunning = false;
    cancelSpeech();
    if (relationWaitTimeoutId) { clearTimeout(relationWaitTimeoutId); relationWaitTimeoutId=null; }
    if (trialTimeoutId) { clearTimeout(trialTimeoutId); trialTimeoutId=null; }
    $('pause').textContent = '▶ Resume';
  } else {
    // Resume
    isPaused = false; isRunning = true;
    $('pause').textContent = '⏸ Pause';
    const pauseMs = parseInt($('pauseMs').value, 10) || 0;
    const trialMs = parseInt($('trialMs').value, 10) || 3000;
    const voiceSnap = selectedVoice;
    (async ()=>{
      await speakRemainingClauses(pauseMs, voiceSnap);
      if (!isRunning || isPaused) return;
      const elapsed = performance.now() - trialStartTs;
      const remain = Math.max(0, trialMs - elapsed);
      trialTimeoutId = setTimeout(()=>{ if (isRunning && !isPaused){ trialIndex++; runNextTrial(); } }, remain);
    })();
  }
};
$('reset').onclick = () => {
  isPaused = false; isRunning = false;
  cancelSpeech();
  if (relationWaitTimeoutId) { clearTimeout(relationWaitTimeoutId); relationWaitTimeoutId=null; }
  if (trialTimeoutId) { clearTimeout(trialTimeoutId); trialTimeoutId=null; }
  trialIndex = 0; currentParts = null; nextClauseIdx = 0; trialStartTs = 0;
  $('premiseDisplay').innerHTML = '';
  document.querySelectorAll('.relationPart').forEach(s=>s.classList.remove('active'));
  $('pause').textContent = '⏸ Pause';
  $('pause').disabled = true; $('reset').disabled = true; $('hit').disabled = true;
};
window.addEventListener('keydown', e => { if (e.key.toLowerCase() === 'm') $('hit').click(); });
</script>
</body>
</html>
