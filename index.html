<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Relational N-Back — Logic‑Only N‑Match (Voice + Visual)</title>
<style>
:root { --bg:#0b0d10; --fg:#e6fbff; --a:#00ccff; --mut:#8fe7ff }
*{ box-sizing:border-box }
body{ font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); margin:0; padding:16px }
.wrap{ max-width:1060px; margin:0 auto }
.row{ display:flex; gap:12px; flex-wrap:wrap }
.col{ flex:1 1 320px }
.box{ background:#101418; border:1px solid rgba(0,200,255,.25); border-radius:14px; padding:12px }
.title{ font-weight:800; margin-bottom:6px; letter-spacing:.3px }
.btn{ background:#0b0d10; color:var(--a); border:1px solid var(--a); border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer }
.btn:disabled{ opacity:.5; cursor:not-allowed }
label{ font-size:12px; color:var(--mut); display:block; margin:6px 0 }
input[type=range],select{ width:100% }
.kbd{ border:1px solid rgba(255,255,255,.25); padding:2px 6px; border-radius:6px; background:#0b0d10 }
.mut{ color:var(--mut); font-size:12px }
#premiseText{ margin-top:12px; min-height:76px; background:#0e1113; border:1px solid rgba(0,200,255,.25); border-radius:12px; padding:10px; font-size:18px; line-height:1.6 }
#premiseText .rel{ padding:0 4px; border-radius:6px }
#premiseText .rel.active{ background:rgba(0,200,255,.20); outline:1px solid rgba(0,200,255,.45) }
#premiseText .sep{ opacity:.65 }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="col">
      <div class="box">
        <div class="title">Timing</div>
        <label>N‑back level: <span id="nVal">1</span></label>
        <input id="n" type="range" min="1" max="10" value="1">
        <label>Trials per block: <span id="tVal">40</span></label>
        <input id="trials" type="range" min="10" max="200" step="5" value="40">
        <label>Trial duration (ms): <span id="dVal">5000</span></label>
        <input id="dur" type="range" min="1500" max="15000" step="250" value="5000">
        <label>Pause between relations in the same premise (ms): <span id="pVal">1000</span></label>
        <input id="pauseTime" type="range" min="0" max="6000" step="50" value="1000">
        <label>Target match rate: <span id="rVal">25%</span></label>
        <input id="rate" type="range" min="5" max="60" step="5" value="25">
        <div class="mut">N‑matches are computed <b>only</b> from relational logic (structure + vectors). Labels/text never affect matching.</div>
      </div>
    </div>
    <div class="col">
      <div class="box">
        <div class="title">Voice</div>
        <label>Country / Region</label>
        <select id="regionSelect"></select>
        <label>Voice</label>
        <select id="voice"></select>
        <label>Rate: <span id="rateVal">0.92</span></label>
        <input id="vRate" type="range" min="0.7" max="1.6" step="0.01" value="0.92">
        <label>Pitch: <span id="pitchVal">1.22</span></label>
        <input id="vPitch" type="range" min="0.7" max="2" step="0.01" value="1.22">
        <label>Volume: <span id="vVolVal">1.00</span></label>
        <input id="vVol" type="range" min="0" max="1" step="0.05" value="1.0">
        <div style="display:flex;gap:8px;margin-top:8px">
          <button id="testVoice" class="btn" type="button">Test voice</button>
          <button id="preloadVoices" class="btn" type="button">Preload voices</button>
        </div>
        <div class="mut">Tip: pick a local region (e.g., Australia) for clear pronunciation.</div>
      </div>
    </div>
    <div class="col">
      <div class="box">
        <div class="title">Controls / Status</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
          <button id="start" class="btn">▶ Start</button>
          <button id="pause" class="btn" disabled>⏸ Pause</button>
          <button id="reset" class="btn" disabled>🔄 Reset</button>
          <button id="hit" class="btn" disabled>✓ Match (<span class="kbd">M</span>)</button>
          <button id="skip" class="btn" disabled>⏭ Skip</button>
        </div>
        <div class="mut" style="margin-top:8px">
          Trial <span id="idx">0</span>/<span id="max">40</span> • Planned: <span id="ptype">—</span> • Actual: <span id="isMatch">—</span>
        </div>
        <div class="mut">Correct: <span id="corr">0</span> • Errors: <span id="err">0</span></div>
      </div>
    </div>
  </div>
  <div class="box" style="margin-top:12px">
    <div class="title">Premise (spoken + visual)</div>
    <div id="premiseText" aria-live="polite">—</div>
  </div>
</div>
<script>
// Helpers
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r=>setTimeout(r, ms));

// Voice state
let VOICE=null; let voicesReady=false;
let userRateChanged=false, userPitchChanged=false;

// Map language codes to full region names
const REGION_NAMES={AU:'Australia',GB:'United Kingdom',UK:'United Kingdom',US:'United States',CA:'Canada',NZ:'New Zealand',IE:'Ireland',IN:'India',ZA:'South Africa',PH:'Philippines',SG:'Singapore',HK:'Hong Kong',NG:'Nigeria'};
const regionCode=lang=> (String(lang).match(/^[a-z]{2,3}[-_]?([A-Z]{2})/)||[])[1]||'';
const regionName=lang=> REGION_NAMES[regionCode(lang)] || (/^en\b/i.test(lang)?'Global English':'Other Region');

// Feminine heuristics (not shown to user)
const POS=/\\b(female|zira|aria|ava|jenny|jessa|samantha|kendra|joanna|olivia|zoe|ella|mia|isla|karen|tessa|moira|hazel|serena|victoria|natasha|catherine|susan|allison|amy|emma|maya|sophia|isabella)\\b/i;
const NEG=/\\b(male|daniel|george|michael|mark|tom|fred|brian|kevin|liam|adam|andy|ben|bruce|charles|david|chris|eric|frank|jack|john|luke|matt|mike|nathan|paul|peter|ryan|steve|tim)\\b/i;
const vKey=v=>v.voiceURI||(v.name+'|'+v.lang);
function feminineScore(v){const s=(v.name+' '+v.voiceURI).toLowerCase();let sc=0;if(POS.test(s))sc+=4;if(/female/.test(s))sc+=5;if(NEG.test(s))sc-=7;return sc;}
const FRIENDLY_POOL={
  'Australia':['Zoe','Isla','Mia','Sophie','Olivia','Ava','Ella','Grace','Ruby','Lily'],
  'United Kingdom':['Sophie','Amelia','Olivia','Grace','Ava','Emily','Isla','Lucy','Chloe','Mia'],
  'United States':['Amy','Emma','Ava','Mia','Sophia','Isabella','Olivia','Ella','Zoe','Grace'],
  'Canada':['Sophie','Chloe','Amelia','Maya','Ella','Zoe','Olivia','Emma','Ava','Mia'],
  'Ireland':['Aoife','Saoirse','Niamh','Aisling','Ciara','Orla','Molly','Katie','Ella','Chloe'],
  'New Zealand':['Aria','Isla','Olivia','Ava','Emily','Sophie','Mia','Zoe','Ella','Grace'],
  'South Africa':['Tessa','Leah','Olivia','Mia','Ava','Ella','Zoe','Grace','Ruby','Chloe'],
  'India':['Aisha','Anaya','Diya','Ira','Kavya','Kiara','Maya','Riya','Sara','Ishita'],
  'Philippines':['Althea','Ariana','Bianca','Clara','Elena','Hannah','Isabella','Julia','Mika','Sofia'],
  'Singapore':['Alyssa','Cheryl','Clara','Elise','Hazel','Jade','Mei','Nicole','Sabrina','Tara'],
  'Hong Kong':['Anna','Cathy','Iris','Joyce','Lily','Mandy','Nina','Queenie','Vicky','Yuki'],
  'Nigeria':['Ada','Amara','Chioma','Ifunanya','Ijeoma','Kachi','Nkem','Nkechi','Ola','Zainab'],
  'Global English':['Amy','Ella','Zoe','Mia','Ava','Sophie','Lily','Ruby','Grace','Chloe'],
  'Other Region':['Amy','Ella','Zoe','Mia','Ava','Sophie','Lily','Ruby','Grace','Chloe']
};
const friendlyNames=new Map();

// Robust voice loader: wake engine, listen for voiceschanged, poll
async function loadVoices(maxWait=6000){
  if(!('speechSynthesis' in window)) return [];
  try{ const u=new SpeechSynthesisUtterance(''); u.volume=0; u.rate=10; speechSynthesis.speak(u); }catch(_){}
  const start=performance.now();
  return new Promise(resolve=>{
    const poll=setInterval(()=>{const vs=speechSynthesis.getVoices();if(vs.length){clearInterval(poll);resolve(vs);} else if(performance.now()-start>maxWait){clearInterval(poll);resolve(vs);}},100);
    speechSynthesis.onvoiceschanged=()=>{clearInterval(poll); resolve(speechSynthesis.getVoices());};
  });
}
async function initVoices(){
  if(voicesReady) return;
  const vs=await loadVoices();
  if(!vs.length){$('voiceHint').textContent='No voices detected. Try clicking “Preload voices” or use another browser.';return;}
  // Build region list
  const regions=[...new Set(vs.map(v=>regionName(v.lang)))].sort();
  $('regionSelect').innerHTML='';
  regions.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;$('regionSelect').appendChild(o);});
  $('regionSelect').value=['Australia','United Kingdom','United States'].find(p=>regions.includes(p))||regions[0];

  // Populate voices for selected region
  const region=$('regionSelect').value;
  populateVoices(vs, region);
  $('regionSelect').onchange=()=>populateVoices(vs,$('regionSelect').value);
  voicesReady=true;
}
function populateVoices(vs, region){
  const list=vs.filter(v=>regionName(v.lang)===region);
  const ranked=list.map(v=>({v,score:feminineScore(v)})).sort((a,b)=>b.score-a.score);
  const fem=ranked.filter(x=>x.score>0).map(x=>x.v);
  const final=fem.length?fem:list;
  const pool=FRIENDLY_POOL[region]||FRIENDLY_POOL['Other Region'];
  let i=0;
  final.forEach(v=>{
    const k=vKey(v);
    if(!friendlyNames.has(k)){
      const base=pool[i%pool.length], cyc=Math.floor(i/pool.length);
      friendlyNames.set(k,cyc?`${base} ${cyc+1}`:base);
      i++;
    }
  });
  $('voice').innerHTML='';
  final.forEach(v=>{
    const o=document.createElement('option');
    o.value=vKey(v); o.textContent=friendlyNames.get(vKey(v))||'Voice';
    o.title=`${v.name} — ${region}`;
    $('voice').appendChild(o);
  });
  const best=fem[0]||final[0]||null;
  if(best){$('voice').value=vKey(best); VOICE=best; applyDefaults();}
}
function applyDefaults(){
  if(!userRateChanged){ $('vRate').value=0.92; $('rateVal').textContent='0.92'; }
  if(!userPitchChanged){ $('vPitch').value=1.22; $('pitchVal').textContent='1.22'; }
}

// Bind slider change to user change flags
$('vRate').oninput=e=>{ userRateChanged=true; $('rateVal').textContent=(+e.target.value).toFixed(2); };
$('vPitch').oninput=e=>{ userPitchChanged=true; $('pitchVal').textContent=(+e.target.value).toFixed(2); };
$('vVol').oninput=e=>{ $('vVolVal').textContent=(+e.target.value).toFixed(2); };
$('preloadVoices').onclick=initVoices;
$('testVoice').onclick=async()=>{ if(!voicesReady) await initVoices(); await speak('Testing voice. Example: C three is north of H seven.'); };

// Speech function
function speak(text){ return new Promise(res=>{ if(!VOICE||!speechSynthesis){ res(); return;} const u=new SpeechSynthesisUtterance(text); u.voice=VOICE; u.lang=VOICE.lang; u.rate=+$('vRate').value; u.pitch=+$('vPitch').value; u.volume=+$('vVol').value; u.onend=res; u.onerror=res; speechSynthesis.speak(u); }); }
function cancelSpeech(){ try{ speechSynthesis.cancel(); }catch(_){} }

// Logic engine helpers
const historyArr=[]; const planArr=[];
let N=1, MAX=40, DUR=5000, REL_PAUSE=1000, RATE=25;
let idx=0, running=false, paused=false;
let waitTimer=null, remainderTimer=null;
let correct=0, errors=0;
let spokenParts=null, clauseIdx=0, trialStart=0;

function sentencesCompatible(a,b){
  const ca=canonicalStructure(a), cb=canonicalStructure(b);
  if(ca.length!==cb.length) return false;
  for(let i=0;i<ca.length;i++){
    const A=ca[i],B=cb[i];
    if(A.from!==B.from||A.to!==B.to) return false;
    if(A.rel.x!==B.rel.x||A.rel.y!==B.rel.y||A.rel.z!==B.rel.z) return false;
  }
  return true;
}
function randomPremise(){
  const [A,B,C]=uniqueTokens(3);
  const pick=()=> Math.random()<0.6
    ? {k:'h',d:HORIZ[Math.floor(Math.random()*HORIZ.length)]}
    : {k:'v',n:LEVELS[Math.floor(Math.random()*LEVELS.length)],up:Math.random()<0.5};
  const r1=pick(), r2=pick();
  return `${A} is ${r1.k==='h'? r1.d : `${r1.n} ${r1.n===1?'level':'levels'} ${r1.up?'above':'below'}`} of ${B} and ${B} is ${r2.k==='h'? r2.d : `${r2.n} ${r2.n===1?'level':'levels'} ${r2.up?'above':'below'}`} of ${C}`;
}
function buildCompatible(s){
  const rels=extractPremiseRelations(s);
  const uniq=[...new Set(rels.flatMap(r=>[r.from,r.to]))].length;
  const labels=uniqueTokens(uniq);
  const map=new Map(); let i=0;
  const parts=rels.map(({from,to,rel})=>{
    if(!map.has(from)) map.set(from,labels[i++]);
    if(!map.has(to)) map.set(to,labels[i++]);
    return `${map.get(from)} is ${rel.z?`${Math.abs(rel.z)} ${Math.abs(rel.z)===1?'level':'levels'} ${rel.z>0?'above':'below'}`:(() => {const {x,y}=rel; if(x===0&&y===-1)return'north'; if(x===0&&y===1)return'south'; if(x===1&&y===0)return'east'; if(x===-1&&y===0)return'west'; if(x===1&&y===-1)return'northeast'; if(x===-1&&y===-1)return'northwest'; if(x===1&&y===1)return'southeast'; return'southwest';})()} of ${map.get(to)}`;
  });
  parts.sort(()=>Math.random()-0.5);
  return parts.join(' and ');
}
function verbalizeSentence(s){ return s.split(/\s+and\s+/i).map(p=>verbalizeClause(p.trim())); }
function buildPremiseVisual(s){
  const parts=s.split(/\s+and\s+/i).map(p=>p.trim());
  $('premiseText').innerHTML='';
  parts.forEach((p,i)=>{
    const sp=document.createElement('span'); sp.className='rel'; sp.textContent=p; $('premiseText').appendChild(sp);
    if(i<parts.length-1){ const sep=document.createElement('span'); sep.className='sep'; sep.textContent=' and '; $('premiseText').appendChild(sep); }
  });
  return parts;
}
function setActivePart(i){ [...$('premiseText').querySelectorAll('.rel')].forEach((n,idx)=>{n.classList.toggle('active',idx===i); }); }
function planBlock(){ planArr.length=0; for(let i=0;i<MAX;i++){ planArr.push(i>=N && Math.random()*100<RATE); } }
function nextSentence(){
  const want=planArr[idx] && idx>=N;
  if(want) return buildCompatible(historyArr[idx-N]);
  let s; let attempts=0;
  do{ s=randomPremise(); attempts++; } while(idx>=N && sentencesCompatible(historyArr[idx-N],s) && attempts<200);
  return s;
}
async function speakPremise(){ if(!spokenParts) return;
  if(!trialStart) trialStart=performance.now();
  while(running && !paused && clauseIdx<spokenParts.length){
    setActivePart(clauseIdx);
    await speak(spokenParts[clauseIdx]+'.');
    if(!running || paused) return;
    if(clauseIdx < spokenParts.length-1){
      await new Promise(res=>{ waitTimer=setTimeout(()=>{waitTimer=null; res(); },REL_PAUSE); });
      if(!running || paused) return;
    }
    clauseIdx++;
  }
  setActivePart(-1);
  const elapsed=performance.now()-trialStart;
  const rem=Math.max(0, DUR-elapsed);
  await new Promise(res=>{ remainderTimer=setTimeout(()=>{remainderTimer=null; res(); }, rem); });
}
async function runTrial(){
  if(!running||paused) return;
  if(idx>=MAX){ stopGame(); return; }
  const s=nextSentence();
  historyArr[idx]=s;
  buildPremiseVisual(s);
  spokenParts=verbalizeSentence(s);
  clauseIdx=0; trialStart=performance.now();
  await speakPremise();
  if(!running||paused) return;
  idx++; updateUI(); runTrial();
}
function startGame(){
  if(running) return;
  running=true; paused=false; cancelSpeech();
  planBlock(); idx=0; correct=0; errors=0; updateUI();
  $('pause').disabled=false; $('reset').disabled=false; $('hit').disabled=false; $('skip').disabled=false;
  $('regionSelect').disabled=true; $('voice').disabled=true;
  runTrial();
}
function stopGame(){
  running=false; paused=false;
  clearTimeout(waitTimer); clearTimeout(remainderTimer);
  waitTimer=null; remainderTimer=null;
  trialStart=0; spokenParts=null; clauseIdx=0;
  cancelSpeech();
  $('pause').disabled=true; $('skip').disabled=true;
  $('regionSelect').disabled=false; $('voice').disabled=false;
}
function togglePause(){
  if(!running && !paused) return;
  if(!paused){
    paused=true; clearTimeout(waitTimer); waitTimer=null; clearTimeout(remainderTimer); remainderTimer=null; cancelSpeech();
    $('pause').textContent='▶ Resume';
  } else {
    paused=false; $('pause').textContent='⏸ Pause';
    if(spokenParts && clauseIdx<spokenParts.length){
      speakPremise().then(()=>{ if(running&&!paused){ idx++; updateUI(); runTrial(); }});
    } else {
      const elapsed=performance.now()-trialStart;
      const rem=Math.max(0,DUR-elapsed);
      remainderTimer=setTimeout(()=>{ if(running&&!paused){ idx++; updateUI(); runTrial(); } }, rem);
    }
  }
}
function resetGame(){
  stopGame(); $('start').disabled=false; $('pause').textContent='⏸ Pause';
  idx=0; correct=0; errors=0; $('premiseText').textContent='—'; updateUI();
}
function updateUI(){
  $('idx').textContent=idx; $('max').textContent=MAX;
  $('ptype').textContent= planArr[idx] && idx>=N ? 'planned MATCH' : 'planned NON-match';
  $('isMatch').textContent= idx>=N ? String(idx>=N && sentencesCompatible(historyArr[idx-N],historyArr[idx])).toUpperCase() : '—';
  $('corr').textContent=correct; $('err').textContent=errors;
  $('nVal').textContent=N; $('tVal').textContent=MAX; $('dVal').textContent=DUR;
  $('pVal').textContent=REL_PAUSE; $('rVal').textContent=RATE+'%';
}
function registerHit(){ if(!running) return; (idx>=N && sentencesCompatible(historyArr[idx-N], historyArr[idx]) ? correct++ : errors++); updateUI(); }
function skipTrial(){ if(!running) return; clearTimeout(waitTimer); clearTimeout(remainderTimer); cancelSpeech(); idx++; updateUI(); runTrial(); }

// Bind UI controls
$('start').onclick=async ()=>{
  await initVoices();
  if(!VOICE && speechSynthesis.getVoices().length){
    const region=$('regionSelect').value;
    const all=speechSynthesis.getVoices().filter(v=>regionName(v.lang)===region);
    VOICE=all.map(v=>({v,score:feminineScore(v)})).sort((a,b)=>b.score-a.score)[0]?.v || all[0];
    applyDefaults();
  }
  startGame();
};
$('pause').onclick=togglePause;
$('reset').onclick=resetGame;
$('hit').onclick=registerHit;
$('skip').onclick=skipTrial;
window.addEventListener('keydown',e=>{ if(e.key.toLowerCase()==='m') registerHit(); });

// Handle timing sliders
$('n').oninput=e=>{ N=+e.target.value; $('nVal').textContent=N; };
$('trials').oninput=e=>{ MAX=+e.target.value; $('tVal').textContent=MAX; $('max').textContent=MAX; };
$('dur').oninput=e=>{ DUR=+e.target.value; $('dVal').textContent=DUR; };
$('pauseTime').oninput=e=>{ REL_PAUSE=+e.target.value; $('pVal').textContent=REL_PAUSE; };
$('rate').oninput=e=>{ RATE=+e.target.value; $('rVal').textContent=RATE+'%'; };

// Initialise voices on page load
document.addEventListener('DOMContentLoaded', initVoices);
</script>
</body>
</html>
