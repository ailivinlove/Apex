<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Relational N‑Back — Logic‑Only (8‑Direction + Vertical) — v3 — Voice + Visual Mode</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0b0d10; color: #e6fbff; margin: 0; padding: 16px; }
  .btn { background: #0b0d10; color: #00ccff; border: 1px solid #00ccff; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
  #premiseDisplay { margin-top: 16px; font-size: 1.2em; line-height: 1.4; min-height: 60px; }
  .relationPart { padding: 2px 4px; border-radius: 4px; }
  .relationPart.active { background: rgba(0,200,255,0.2); border: 1px solid rgba(0,200,255,0.5); }
</style>
</head>
<body>
<div>
  <button id="start" class="btn">▶ Start</button>
  <button id="hit" class="btn" disabled>✓ Match (M)</button>
  <label for="voiceSelect" style="margin-left:8px">Voice:</label>
  <select id="voiceSelect"></select>
  <label for="pauseMs" style="margin-left:8px">Pause between relations (ms):</label>
  <input id="pauseMs" type="number" value="6000" min="0" step="100" style="width:100px">
  <label for="trialMs" style="margin-left:8px">Trial duration (ms):</label>
  <input id="trialMs" type="number" value="5000" min="1000" step="250" style="width:100px">
</div>
<div id="premiseDisplay"></div>
<script>
const $ = id => document.getElementById(id);

// ===== Friendly voice naming & stable selection =====
let selectedVoice = null; // stays constant during a premise
const FRIENDLY_POOL = ['Amy','Ben','Chloe','David','Ella','Finn','Grace','Hugo','Isla','Jack','Kara','Leo','Maya','Noah','Olive','Piper','Quinn','Ruby','Sam','Tess','Uma','Vik','Will','Zoe'];
const voiceKey = v => v.voiceURI || (v.name + '|' + v.lang);
let friendlyByKey = new Map();

function assignFriendlyNames(voices){
  // Deterministic: sort, then assign names in order; reuse existing assignments
  const sorted = [...voices].sort((a,b)=> (a.lang||'').localeCompare(b.lang||'') || (a.name||'').localeCompare(b.name||''));
  let idx = 0;
  sorted.forEach(v => {
    const key = voiceKey(v);
    if (!friendlyByKey.has(key)) {
      const base = FRIENDLY_POOL[idx % FRIENDLY_POOL.length];
      const cycles = Math.floor(idx / FRIENDLY_POOL.length);
      friendlyByKey.set(key, cycles ? base + ' ' + (cycles+1) : base);
      idx++;
    }
  });
}

function populateVoices(){
  const select = $('voiceSelect');
  const voices = speechSynthesis.getVoices();
  assignFriendlyNames(voices);
  const prevKey = selectedVoice && voiceKey(selectedVoice);
  select.innerHTML = '';
  voices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = voiceKey(v);
    opt.textContent = friendlyByKey.get(opt.value) || 'Voice'; // single friendly name only
    select.appendChild(opt);
  });
  // Preserve selection if possible, otherwise choose first
  let chosen = voices[0] || null;
  if (prevKey) {
    const keep = voices.find(v => voiceKey(v) === prevKey);
    if (keep) chosen = keep;
  }
  selectedVoice = chosen;
  if (chosen) select.value = voiceKey(chosen);
}

if ('speechSynthesis' in window){
  if (speechSynthesis.getVoices().length) populateVoices();
  speechSynthesis.onvoiceschanged = () => { // do not change current selection mid‑run
    const running = isRunning; // capture
    populateVoices();
    if (running) { $('voiceSelect').disabled = true; } else { $('voiceSelect').disabled = false; }
  };
}

$('voiceSelect')?.addEventListener('change', () => {
  const key = $('voiceSelect').value;
  const v = speechSynthesis.getVoices().find(v => voiceKey(v) === key);
  if (v) selectedVoice = v; // lock to chosen voice
});

// ===== Speech helpers =====
let VOICE_ENABLED = true;
let voiceRate = 1.0, voicePitch = 1.0, voiceVolume = 1.0;
function speak(text, voiceSnap){
  return new Promise(resolve => {
    if (!VOICE_ENABLED || !window.speechSynthesis) { resolve(); return; }
    const utter = new SpeechSynthesisUtterance(text);
    if (voiceSnap) utter.voice = voiceSnap; // DO NOT change within a premise
    utter.rate = voiceRate; utter.pitch = voicePitch; utter.volume = voiceVolume; utter.lang = voiceSnap?.lang || undefined;
    utter.onend = () => resolve();
    utter.onerror = () => resolve();
    window.speechSynthesis.speak(utter);
  });
}

// ===== Visual display =====
function updatePremiseDisplay(parts) {
  const container = $('premiseDisplay');
  container.innerHTML = '';
  parts.forEach((part, idx) => {
    const span = document.createElement('span');
    span.className = 'relationPart';
    span.textContent = part;
    container.appendChild(span);
    if (idx < parts.length - 1) container.appendChild(document.createTextNode(' and '));
  });
}

async function playPremise(parts, perRelationDelayMs, voiceSnap) {
  updatePremiseDisplay(parts);
  const spans = document.querySelectorAll('.relationPart');
  for (let i = 0; i < parts.length; i++) {
    spans.forEach((s, idx) => s.classList.toggle('active', idx === i));
    await speak(parts[i], voiceSnap);
    if (i < parts.length - 1) await new Promise(res => setTimeout(res, perRelationDelayMs));
  }
  spans.forEach(s => s.classList.remove('active'));
}

// ===== Minimal premise generator (placeholder) =====
const DIRS = ['north','south','east','west','northeast','northwest','southeast','southwest'];
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
function token(){ return LETTERS[Math.floor(Math.random()*26)] + (1+Math.floor(Math.random()*9)); }
function generatePremiseParts(){
  const A = token(), B = token(), C = token();
  const d1 = DIRS[Math.floor(Math.random()*DIRS.length)];
  const d2 = DIRS[Math.floor(Math.random()*DIRS.length)];
  return [`${A} is 1 ${d1} of ${B}`, `${B} is 1 ${d2} of ${C}`];
}

// ===== Trial loop (fix: continue after first premise) =====
let isRunning = false;
let trialIndex = 0;

async function runNextTrial(){
  if (!isRunning) return;
  const pauseMs = parseInt($('pauseMs').value, 10) || 0;
  const trialMs = parseInt($('trialMs').value, 10) || 3000;
  const voiceSnap = selectedVoice; // lock voice for the whole premise

  // Build parts for this trial
  const parts = generatePremiseParts();
  const t0 = performance.now();
  await playPremise(parts, pauseMs, voiceSnap);
  const elapsed = performance.now() - t0;
  const remain = Math.max(0, trialMs - elapsed);
  setTimeout(()=>{ if (isRunning){ trialIndex++; runNextTrial(); } }, remain);
}

$('start').onclick = () => {
  $('hit').disabled = false;
  if (!selectedVoice && speechSynthesis.getVoices().length){ selectedVoice = speechSynthesis.getVoices()[0]; }
  isRunning = true; trialIndex = 0; runNextTrial();
};

$('hit').onclick = () => { console.log('Match pressed'); };

window.addEventListener('keydown', e => { if (e.key.toLowerCase() === 'm') $('hit').click(); });
</script>
</body>
</html>
