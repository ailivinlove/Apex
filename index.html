<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Relational N-Back — Logic‑Only N‑Match (Voice + Visual)</title>
<style>
:root { --bg:#0b0d10; --fg:#e6fbff; --a:#00ccff; --mut:#8fe7ff }
*{ box-sizing:border-box }
body{ font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); margin:0; padding:16px }
.wrap{ max-width:1060px; margin:0 auto }
.row{ display:flex; gap:12px; flex-wrap:wrap }
.col{ flex:1 1 320px }
.box{ background:#101418; border:1px solid rgba(0,200,255,.25); border-radius:14px; padding:12px }
.title{ font-weight:800; margin-bottom:6px; letter-spacing:.3px }
.btn{ background:#0b0d10; color:var(--a); border:1px solid var(--a); border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer }
.btn:disabled{ opacity:.5; cursor:not-allowed }
label{ font-size:12px; color:var(--mut); display:block; margin:6px 0 }
input[type=range],select{ width:100% }
.kbd{ border:1px solid rgba(255,255,255,.25); padding:2px 6px; border-radius:6px; background:#0b0d10 }
.mut{ color:var(--mut); font-size:12px }
#premiseText{ margin-top:12px; min-height:76px; background:#0e1113; border:1px solid rgba(0,200,255,.25); border-radius:12px; padding:10px; font-size:18px; line-height:1.6 }
#premiseText .rel{ padding:0 4px; border-radius:6px }
#premiseText .rel.active{ background:rgba(0,200,255,.20); outline:1px solid rgba(0,200,255,.45) }
#premiseText .sep{ opacity:.65 }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="col">
      <div class="box">
        <div class="title">Timing</div>
        <label>N‑back level: <span id="nVal">1</span></label>
        <input id="n" type="range" min="1" max="10" value="1">
        <label>Trials per block: <span id="tVal">40</span></label>
        <input id="trials" type="range" min="10" max="200" step="5" value="40">
        <label>Trial duration (ms): <span id="dVal">5000</span></label>
        <input id="dur" type="range" min="1500" max="15000" step="250" value="5000">
        <label>Pause between relations in the same premise (ms): <span id="pVal">1000</span></label>
        <input id="pauseTime" type="range" min="0" max="6000" step="50" value="1000">
        <label>Target match rate: <span id="rVal">25%</span></label>
        <input id="rate" type="range" min="5" max="60" step="5" value="25">
        <div class="mut">N‑matches are computed <b>only</b> from relational logic (structure + vectors). Labels/text never affect matching.</div>
      </div>
    </div>

    <div class="col">
      <div class="box">
        <div class="title">Voice</div>
        <label>Country / Region</label>
        <select id="regionSelect"></select>
        <label>Voice</label>
        <select id="voice"></select>
        <label>Rate: <span id="rateVal">0.92</span></label>
        <input id="vRate" type="range" min="0.7" max="1.6" step="0.01" value="0.92">
        <label>Pitch: <span id="pitchVal">1.22</span></label>
        <input id="vPitch" type="range" min="0.7" max="2" step="0.01" value="1.22">
        <label>Volume: <span id="vVolVal">1.00</span></label>
        <input id="vVol" type="range" min="0" max="1" step="0.05" value="1.0">
        <div style="display:flex;gap:8px;margin-top:8px">
          <button id="testVoice" class="btn" type="button">Test voice</button>
          <button id="preloadVoices" class="btn" type="button">Preload voices</button>
        </div>
        <div class="mut" id="voiceHint">Tip: pick a local region (e.g., Australia) for clear pronunciation.</div>
      </div>
    </div>

    <div class="col">
      <div class="box">
        <div class="title">Controls / Status</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
          <button id="start" class="btn">▶ Start</button>
          <button id="pause" class="btn" disabled>⏸ Pause</button>
          <button id="reset" class="btn" disabled>🔄 Reset</button>
          <button id="hit" class="btn" disabled>✓ Match (<span class="kbd">M</span>)</button>
          <button id="skip" class="btn" disabled>⏭ Skip</button>
        </div>
        <div class="mut" style="margin-top:8px">
          Trial <span id="idx">0</span>/<span id="max">40</span> • Planned: <span id="ptype">—</span> • Actual: <span id="isMatch">—</span>
        </div>
        <div class="mut">Correct: <span id="corr">0</span> • Errors: <span id="err">0</span></div>
      </div>
    </div>
  </div>

  <div class="box" style="margin-top:12px">
    <div class="title">Premise (spoken + visual)</div>
    <div id="premiseText" aria-live="polite">—</div>
  </div>
</div>

<script>
/* ----------------------- Helpers ----------------------- */
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ----------------------- Voice loading ----------------------- */
let VOICE = null;
let voicesReady = false;
let userTweakedRate = false;
let userTweakedPitch = false;

/* Region name mapping */
const REGION_NAMES = {
  AU: 'Australia', GB: 'United Kingdom', UK: 'United Kingdom', US: 'United States',
  CA: 'Canada', NZ: 'New Zealand', IE: 'Ireland', IN: 'India', ZA: 'South Africa',
  PH: 'Philippines', SG: 'Singapore', HK: 'Hong Kong', NG: 'Nigeria'
};
function regionCode(lang) {
  const m = String(lang).match(/^[a-z]{2,3}[-_]?([A-Z]{2})/);
  return m ? m[1] : '';
}
function regionName(lang) {
  const code = regionCode(lang);
  if (REGION_NAMES[code]) return REGION_NAMES[code];
  if (/^en\b/i.test(lang)) return 'Global English';
  return 'Other Region';
}

/* Hidden scoring to prefer feminine voices (UI stays neutral) */
const FEMALE_POS = /\b(female|zira|aria|ava|jenny|jessa|samantha|kendra|joanna|olivia|zoe|ella|mia|isla|karen|tessa|moira|hazel|serena|victoria|natasha|catherine|susan|allison|amy|emma|maya|sophia|isabella)\b/i;
const MALE_NEG = /\b(male|daniel|george|michael|mark|tom|fred|brian|kevin|liam|adam|andy|ben|bruce|charles|david|chris|eric|frank|jack|john|luke|matt|mike|nathan|paul|peter|ryan|steve|tim)\b/i;

function feminineScore(v) {
  const s = (v.name + ' ' + v.voiceURI).toLowerCase();
  let score = 0;
  if (FEMALE_POS.test(s)) score += 4;
  if (/female/.test(s)) score += 5;
  if (MALE_NEG.test(s)) score -= 7;
  return score;
}

/* Friendly voice names pool; one per region */
const FRIENDLY_POOL = {
  'Australia': ['Zoe','Isla','Mia','Sophie','Olivia','Ava','Ella','Grace','Ruby','Lily'],
  'United Kingdom': ['Sophie','Amelia','Olivia','Grace','Ava','Emily','Isla','Lucy','Chloe','Mia'],
  'United States': ['Amy','Emma','Ava','Mia','Sophia','Isabella','Olivia','Ella','Zoe','Grace'],
  'Canada': ['Sophie','Chloe','Amelia','Maya','Ella','Zoe','Olivia','Emma','Ava','Mia'],
  'Ireland': ['Aoife','Saoirse','Niamh','Aisling','Ciara','Orla','Molly','Katie','Ella','Chloe'],
  'New Zealand': ['Aria','Isla','Olivia','Ava','Emily','Sophie','Mia','Zoe','Ella','Grace'],
  'South Africa': ['Tessa','Leah','Olivia','Mia','Ava','Ella','Zoe','Grace','Ruby','Chloe'],
  'India': ['Aisha','Anaya','Diya','Ira','Kavya','Kiara','Maya','Riya','Sara','Ishita'],
  'Philippines': ['Althea','Ariana','Bianca','Clara','Elena','Hannah','Isabella','Julia','Mika','Sofia'],
  'Singapore': ['Alyssa','Cheryl','Clara','Elise','Hazel','Jade','Mei','Nicole','Sabrina','Tara'],
  'Hong Kong': ['Anna','Cathy','Iris','Joyce','Lily','Mandy','Nina','Queenie','Vicky','Yuki'],
  'Nigeria': ['Ada','Amara','Chioma','Ifunanya','Ijeoma','Kachi','Nkem','Nkechi','Ola','Zainab'],
  'Global English': ['Amy','Ella','Zoe','Mia','Ava','Sophie','Lily','Ruby','Grace','Chloe'],
  'Other Region': ['Amy','Ella','Zoe','Mia','Ava','Sophie','Lily','Ruby','Grace','Chloe']
};
const friendlyNames = new Map();

/* Load voices robustly: wake engine, wait for voiceschanged, poll if needed */
async function loadVoices(maxWait = 6000) {
  if (!('speechSynthesis' in window)) return [];
  // Kick speech engine with a silent utterance
  try {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0; u.rate = 10;
    speechSynthesis.speak(u);
  } catch (_) {}
  // Wait for voiceschanged or poll
  const start = performance.now();
  return new Promise(resolve => {
    const poll = setInterval(() => {
      const v = speechSynthesis.getVoices();
      if (v.length) {
        clearInterval(poll);
        resolve(v);
      } else if (performance.now() - start > maxWait) {
        clearInterval(poll);
        resolve(v);
      }
    }, 100);
    speechSynthesis.onvoiceschanged = () => {
      clearInterval(poll);
      resolve(speechSynthesis.getVoices());
    };
  });
}

/* Populate region list and voice list after voices loaded */
function buildRegionOptions(voices) {
  const regions = [...new Set(voices.map(v => regionName(v.lang)))].sort((a,b) => a.localeCompare(b));
  const sel = $('regionSelect');
  sel.innerHTML = '';
  regions.forEach(region => {
    const opt = document.createElement('option');
    opt.value = region; opt.textContent = region;
    sel.appendChild(opt);
  });
  // Default preference order
  const prefs = ['Australia','United Kingdom','United States'];
  sel.value = prefs.find(p => regions.includes(p)) || regions[0] || '';
}
function populateVoicesForRegion(voices) {
  const region = $('regionSelect').value;
  const list = voices.filter(v => regionName(v.lang) === region);
  // Rank by feminine score
  const ranked = list.map(v => ({v, score: feminineScore(v)})).sort((a,b) => b.score - a.score);
  const fem = ranked.filter(x => x.score > 0).map(x => x.v);
  const final = fem.length ? fem : list;
  // Assign friendly names
  const pool = FRIENDLY_POOL[region] || FRIENDLY_POOL['Other Region'];
  let i = 0;
  final.forEach(v => {
    const key = vKey(v);
    if (!friendlyNames.has(key)) {
      const base = pool[i % pool.length];
      const cyc = Math.floor(i / pool.length);
      friendlyNames.set(key, cyc ? `${base} ${cyc+1}` : base);
      i++;
    }
  });
  const sel = $('voice');
  sel.innerHTML = '';
  final.forEach(v => {
    const opt = document.createElement('option');
    opt.value = vKey(v);
    opt.textContent = friendlyNames.get(vKey(v)) || 'Voice';
    opt.title = `${v.name} — ${region}`;
    sel.appendChild(opt);
  });
  // Choose best by default
  const best = fem[0] || final[0] || null;
  if (best) {
    sel.value = vKey(best);
    VOICE = best;
    applySexyDefaultsIfUntouched();
  }
}

/* Kick off voice loading and UI population */
async function initVoices() {
  const hint = $('voiceHint');
  const list = await loadVoices();
  if (!list.length) {
    hint.textContent = 'No voices detected. Try clicking “Preload voices” or using another browser.';
    return;
  }
  buildRegionOptions(list);
  populateVoicesForRegion(list);
  // Re-populate voices when region changes
  $('regionSelect').onchange = () => populateVoicesForRegion(list);
  // Indicate ready
  voicesReady = true;
}

/* Event handlers for user-adjusted sliders */
$('vRate').addEventListener('input', e => {
  userTweakedRate = true;
  $('rateVal').textContent = (+e.target.value).toFixed(2);
});
$('vPitch').addEventListener('input', e => {
  userTweakedPitch = true;
  $('pitchVal').textContent = (+e.target.value).toFixed(2);
});
$('vVol').addEventListener('input', e => {
  $('vVolVal').textContent = (+e.target.value).toFixed(2);
});

/* Apply hidden defaults if user didn’t adjust */
function applySexyDefaultsIfUntouched() {
  if (!userTweakedRate) {
    $('vRate').value = 0.92;
    $('rateVal').textContent = '0.92';
  }
  if (!userTweakedPitch) {
    $('vPitch').value = 1.22;
    $('pitchVal').textContent = '1.22';
  }
}

/* Preload voices button */
$('preloadVoices').onclick = () => initVoices();

/* Test voice button */
$('testVoice').onclick = async () => {
  if (!voicesReady) await initVoices();
  await speak('Testing voice. Example: G six is one level below V four. I nine is two levels above V four.');
};

/* ----------------------- Logic engine ----------------------- */
/* Convert relation into vector or clause string */
function clauseString(from, rel, to) {
  if (rel.z && rel.z !== 0) {
    const n = Math.abs(rel.z);
    const word = n === 1 ? 'one level' : n === 2 ? 'two levels' : 'three levels';
    return `${from} is ${word} ${rel.z > 0 ? 'above' : 'below'} ${to}`;
  } else {
    const dir = (rel.x === 0 && rel.y === -1) ? 'north' :
                (rel.x === 0 && rel.y ===  1) ? 'south' :
                (rel.x === 1 && rel.y ===  0) ? 'east'  :
                (rel.x ===-1 && rel.y === 0) ? 'west'  :
                (rel.x === 1 && rel.y === -1) ? 'northeast' :
                (rel.x ===-1 && rel.y === -1) ? 'northwest' :
                (rel.x === 1 && rel.y ===  1) ? 'southeast' : 'southwest';
    return `${from} is ${dir} of ${to}`;
  }
}
function normalizeRelation(relPhrase) {
  const s = String(relPhrase).trim().toLowerCase();
  let mv = s.match(/\b(one|two|three|1|2|3)\s*(?:levels?)?\s+(above|below)\b/);
  if (mv) {
    let n = mv[1]; if (n === 'one') n = 1; else if (n === 'two') n = 2; else if (n === 'three') n = 3; else n = +n;
    const up = mv[2] === 'above';
    return { x: 0, y: 0, z: up ? n : -n };
  }
  let mh = s.match(/\b(north(?:east|west)?|south(?:east|west)?|east|west)\b/);
  if (mh) {
    const base = DIRS[mh[1]];
    return { x: base.x, y: base.y, z: 0 };
  }
  return null;
}

/* Extract relations from sentence */
function extractPremiseRelations(sentence) {
  const parts = sentence.split(/\s+and\s+/i).map(p => p.trim());
  const rels = [];
  for (const part of parts) {
    let m = part.match(/^([A-Z]\d+)\s+is\s+(one|two|three|1|2|3)\s*(?:levels?)?\s+(above|below)\s+([A-Z]\d+)$/i);
    if (m) {
      const R = normalizeRelation(`${m[2]} ${m[3]}`);
      if (R) { rels.push({ from: m[1], to: m[4], rel: R }); continue; }
    }
    m = part.match(/^([A-Z]\d+)\s+is\s+(north(?:east|west)?|south(?:east|west)?|east|west)\s+of\s+([A-Z]\d+)$/i);
    if (m) {
      const R = normalizeRelation(m[2]);
      if (R) { rels.push({ from: m[1], to: m[3], rel: R }); continue; }
    }
    // accept "above of"/"below of"
    m = part.match(/^([A-Z]\d+)\s+is\s+(one|two|three|1|2|3)\s*(?:levels?)?\s+(above|below)\s+of\s+([A-Z]\d+)$/i);
    if (m) {
      const R = normalizeRelation(`${m[2]} ${m[3]}`);
      if (R) { rels.push({ from: m[1], to: m[4], rel: R }); continue; }
    }
  }
  return rels;
}

/* Canonicalize sentences: rename tokens and sort relations for logical comparison */
function canonicalStructure(sentence) {
  const rels = extractPremiseRelations(sentence);
  const seen = new Map();
  let idx = 0;
  const order = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const canon = rels.map(({from, to, rel}) => {
    if (!seen.has(from)) seen.set(from, order[idx++]);
    if (!seen.has(to))   seen.set(to, order[idx++]);
    return { from: seen.get(from), to: seen.get(to), rel };
  });
  canon.sort((a, b) => {
    const A = a.from + a.to + JSON.stringify(a.rel);
    const B = b.from + b.to + JSON.stringify(b.rel);
    return A.localeCompare(B);
  });
  return canon;
}
function sentencesCompatible(a, b) {
  const ca = canonicalStructure(a), cb = canonicalStructure(b);
  if (ca.length !== cb.length) return false;
  for (let i = 0; i < ca.length; i++) {
    const A = ca[i], B = cb[i];
    if (A.from !== B.from || A.to !== B.to) return false;
    if (A.rel.x !== B.rel.x || A.rel.y !== B.rel.y || A.rel.z !== B.rel.z) return false;
  }
  return true;
}

/* Generate random premise sentences */
function randomPremise() {
  const [A, B, C, D] = uniqueTokens(4);
  const pickRel = () => {
    if (Math.random() < 0.6) {
      const d = HORIZ[Math.floor(Math.random()*HORIZ.length)];
      return { k: 'h', d };
    }
    const n = LEVELS[Math.floor(Math.random()*LEVELS.length)];
    const up = Math.random() < 0.5;
    return { k: 'v', n, up };
  };
  const r1 = pickRel(), r2 = pickRel(), r3 = pickRel();
  const clause = (X, rel, Y) => {
    if (rel.k === 'h') return `${X} is ${rel.d} of ${Y}`;
    return `${X} is ${rel.n} ${rel.n === 1 ? 'level' : 'levels'} ${rel.up ? 'above' : 'below'} ${Y}`;
  };
  switch (Math.floor(Math.random() * 4)) {
    case 0: return `${clause(A, r1, B)} and ${clause(B, r2, C)}`;
    case 1: return `${clause(A, r1, B)} and ${clause(C, r2, A)}`;
    case 2: return `${clause(A, r1, B)} and ${clause(C, r2, B)} and ${clause(A, r3, C)}`;
    default: return `${clause(A, r1, B)} and ${clause(C, r2, A)} and ${clause(B, r3, C)}`;
  }
}

/* Build logically compatible sentence with new labels */
function buildCompatible(sentence) {
  const rels = extractPremiseRelations(sentence);
  const uniq = [...new Set(rels.flatMap(r => [r.from, r.to]))].length;
  const labels = uniqueTokens(uniq);
  const map = new Map();
  let i = 0;
  const parts = rels.map(({from,to,rel}) => {
    if (!map.has(from)) map.set(from, labels[i++]);
    if (!map.has(to))   map.set(to,   labels[i++]);
    return clauseString(map.get(from), rel, map.get(to));
  });
  for (let j = parts.length - 1; j > 0; j--) {
    const k = Math.floor(Math.random() * (j + 1));
    [parts[j], parts[k]] = [parts[k], parts[j]];
  }
  return parts.join(' and ');
}

/* Speaking & transcript functions */
function sayToken(tok) {
  const m = tok.match(/^([A-Z])(\d+)$/);
  if (!m) return tok;
  const map = { '0':'zero','1':'one','2':'two','3':'three','4':'four','5':'five','6':'six','7':'seven','8':'eight','9':'nine' };
  const digits = m[2].split('').map(d => map[d] || d).join(' ');
  return `${m[1]} ${digits}`;
}
function splitDiagonal(dir) {
  return dir.replace(/northeast/gi, 'north east')
            .replace(/northwest/gi, 'north west')
            .replace(/southeast/gi, 'south east')
            .replace(/southwest/gi, 'south west');
}
function verbalizeClause(clause) {
  let m = clause.match(/^([A-Z]\d+)\s+is\s+(one|two|three|1|2|3)\s*(?:levels?)?\s+(above|below)\s+([A-Z]\d+)$/i);
  if (m) {
    const left = sayToken(m[1]);
    const n = +({ one:1, two:2, three:3 }[m[2].toLowerCase()] ?? m[2]);
    const word = n === 1 ? 'one level' : n === 2 ? 'two levels' : 'three levels';
    const right = sayToken(m[4]);
    return `${left} is ${word} ${m[3].toLowerCase()} ${right}`;
  }
  m = clause.match(/^([A-Z]\d+)\s+is\s+(north(?:east|west)?|south(?:east|west)?|east|west)\s+of\s+([A-Z]\d+)$/i);
  if (m) {
    return `${sayToken(m[1])} is ${splitDiagonal(m[2])} of ${sayToken(m[3])}`;
  }
  return clause;
}
function verbalizeSentence(s) {
  return s.split(/\s+and\s+/i).map(p => verbalizeClause(p.trim()));
}
function buildPremiseVisual(raw) {
  const parts = raw.split(/\s+and\s+/i).map(p => p.trim());
  const el = $('premiseText');
  el.innerHTML = '';
  parts.forEach((part, i) => {
    const sp = document.createElement('span');
    sp.className = 'rel'; sp.textContent = part;
    el.appendChild(sp);
    if (i < parts.length - 1) {
      const sep = document.createElement('span');
      sep.className = 'sep'; sep.textContent = ' and ';
      el.appendChild(sep);
    }
  });
  return parts;
}
function setActivePart(i) {
  [...$('premiseText').querySelectorAll('.rel')].forEach((n, idx) => {
    n.classList.toggle('active', idx === i);
  });
}

/* Gameplay variables */
let N = 1, MAX = 40, DUR = 5000, REL_PAUSE = 1000, RATE = 25;
let idx = 0, running = false, paused = false;
let waitTimer = null, remainderTimer = null;
const history = [], planned = [];
let correct = 0, errors = 0;
let spokenParts = null, clauseIdx = 0, trialStart = 0;

function planSequence() {
  planned.length = 0;
  for (let i = 0; i < MAX; i++) {
    planned.push(i >= N && Math.random() * 100 < RATE);
  }
}
function isActualMatch(i) {
  return i >= N && sentencesCompatible(history[i-N], history[i]);
}

async function speakPremise() {
  if (!spokenParts) return;
  if (!trialStart) trialStart = performance.now();
  while (running && !paused && clauseIdx < spokenParts.length) {
    setActivePart(clauseIdx);
    await speak(spokenParts[clauseIdx] + '.');
    if (!running || paused) return;
    if (clauseIdx < spokenParts.length - 1) {
      await new Promise(res => {
        waitTimer = setTimeout(() => { waitTimer = null; res(); }, REL_PAUSE);
      });
      if (!running || paused) return;
    }
    clauseIdx++;
  }
  setActivePart(-1);
  const elapsed = performance.now() - trialStart;
  const remaining = Math.max(0, DUR - elapsed);
  await new Promise(res => {
    remainderTimer = setTimeout(() => { remainderTimer = null; res(); }, remaining);
  });
}

function nextPremiseString() {
  const wantMatch = planned[idx] && idx >= N;
  if (wantMatch) {
    return buildCompatible(history[idx - N]);
  }
  // ensure mismatch
  let s, tries = 0;
  do {
    s = randomPremise();
    tries++;
  } while (idx >= N && sentencesCompatible(history[idx - N], s) && tries < 200);
  if (idx >= N && sentencesCompatible(history[idx - N], s)) {
    const rels = extractPremiseRelations(s);
    if (rels.length) {
      const r0 = rels[0];
      if (r0.rel.z !== 0) {
        r0.rel.z *= -1;
      } else {
        r0.rel.x *= -1; r0.rel.y *= -1;
      }
      s = rels.map(r => clauseString(r.from, r.rel, r.to)).join(' and ');
    }
  }
  return s;
}

async function runTrial() {
  if (!running || paused) return;
  if (idx >= MAX) { stop(); return; }

  const s = nextPremiseString();
  history[idx] = s;

  buildPremiseVisual(s);
  spokenParts = verbalizeSentence(s);
  clauseIdx = 0; trialStart = performance.now();

  await speakPremise();
  if (!running || paused) return;

  idx++; updateUI();
  runTrial();
}

/* Control functions */
function start() {
  if (running) return;
  running = true; paused = false; cancelSpeech();
  planSequence(); idx = 0; correct = 0; errors = 0; updateUI();
  $('pause').disabled = false; $('reset').disabled = false; $('hit').disabled = false; $('skip').disabled = false;
  $('regionSelect').disabled = true; $('voice').disabled = true;
  runTrial();
}
function stop() {
  running = false; paused = false;
  clearTimeout(waitTimer); waitTimer = null;
  clearTimeout(remainderTimer); remainderTimer = null;
  trialStart = 0; spokenParts = null; clauseIdx = 0;
  cancelSpeech();
  $('pause').disabled = true; $('skip').disabled = true;
  $('regionSelect').disabled = false; $('voice').disabled = false;
}
function togglePause() {
  if (!running && !paused) return;
  if (!paused) {
    paused = true;
    clearTimeout(waitTimer); waitTimer = null;
    clearTimeout(remainderTimer); remainderTimer = null;
    cancelSpeech();
    $('pause').textContent = '▶ Resume';
  } else {
    paused = false;
    $('pause').textContent = '⏸ Pause';
    if (spokenParts && clauseIdx < spokenParts.length) {
      speakPremise().then(() => {
        if (running && !paused) {
          idx++; updateUI(); runTrial();
        }
      });
    } else {
      const elapsed = performance.now() - trialStart;
      const remaining = Math.max(0, DUR - elapsed);
      remainderTimer = setTimeout(() => {
        if (running && !paused) {
          idx++; updateUI(); runTrial();
        }
      }, remaining);
    }
  }
}
function reset() {
  stop();
  $('start').disabled = false;
  $('pause').textContent = '⏸ Pause';
  idx = 0; correct = 0; errors = 0; $('premiseText').textContent = '—';
  updateUI();
}
function registerHit() {
  if (!running) return;
  const truth = isActualMatch(idx);
  if (truth) correct++; else errors++;
  updateUI();
}
function skip() {
  if (!running) return;
  clearTimeout(waitTimer); clearTimeout(remainderTimer); cancelSpeech();
  idx++; updateUI(); runTrial();
}
function updateUI() {
  $('idx').textContent = idx; $('max').textContent = MAX;
  $('ptype').textContent = planned[idx] && idx>=N ? 'planned MATCH' : 'planned NON-match';
  $('isMatch').textContent = idx>=N ? String(isActualMatch(idx)).toUpperCase() : '—';
  $('corr').textContent = correct; $('err').textContent = errors;
  $('nVal').textContent = N; $('tVal').textContent = MAX; $('dVal').textContent = DUR;
  $('pVal').textContent = REL_PAUSE; $('rVal').textContent = RATE + '%';
}

/* Bind controls */
$('start').onclick = async () => {
  await initVoices();
  if (!VOICE && speechSynthesis.getVoices().length) {
    // Choose best voice based on region and score
    const region = $('regionSelect').value;
    const all = speechSynthesis.getVoices().filter(v => regionName(v.lang) === region);
    const best = all.map(v => ({v, score:feminineScore(v)})).sort((a,b) => b.score - a.score)[0]?.v || all[0] || null;
    VOICE = best;
    applySexyDefaultsIfUntouched();
  }
  start();
};
$('pause').onclick = togglePause;
$('reset').onclick = reset;
$('hit').onclick = registerHit;
$('skip').onclick = skip;
window.addEventListener('keydown', e => { if (e.key.toLowerCase() === 'm') registerHit(); });

$('n').oninput = e => { N = +e.target.value; $('nVal').textContent = N; };
$('trials').oninput = e => { MAX = +e.target.value; $('tVal').textContent = MAX; $('max').textContent = MAX; };
$('dur').oninput = e => { DUR = +e.target.value; $('dVal').textContent = DUR; };
$('pauseTime').oninput = e => { REL_PAUSE = +e.target.value; $('pVal').textContent = REL_PAUSE; };
$('rate').oninput = e => { RATE = +e.target.value; $('rVal').textContent = RATE + '%'; };

/* Try to initialise voices on page load */
document.addEventListener('DOMContentLoaded', initVoices);
</script>
